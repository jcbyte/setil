<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="robots" content="noindex, nofollow" />
		<title>Setil - Down for Maintenance</title>
		<script src="https://cdn.tailwindcss.com"></script>
		<style>
			:root {
				--background: hsl(240 10% 3.9%);
				--foreground: hsl(0 0% 98%);
				--card: hsl(240 10% 3.9%);
				--card-foreground: hsl(0 0% 98%);
				--primary: hsl(0 0% 98%);
				--primary-foreground: hsl(240 5.9% 10%);
				--muted: hsl(240 3.7% 15.9%);
				--muted-foreground: hsl(240 5% 64.9%);
				--accent: hsl(240 3.7% 15.9%);
				--accent-foreground: hsl(0 0% 98%);
				--destructive: hsl(0 62.8% 30.6%);
				--destructive-foreground: hsl(0 0% 98%);
				--border: hsl(240 3.7% 15.9%);
				--input: hsl(240 3.7% 15.9%);
				--ring: hsl(240 4.9% 83.9%);
			}
		</style>
	</head>
	<body class="bg-[--background] text-[--foreground] flex items-center justify-center min-h-screen">
		<div
			class="border-[--border] bg-[--card] text-[--card-foreground] flex flex-col items-center justify-center gap-2 border p-8 rounded-lg min-w-[320px] shadow-md"
		>
			<div class="flex flex-col items-center justify-center gap-2">
				<span class="text-2xl font-bold text-center">🚧 Setil will be back soon!</span>
				<span class="text-[--muted-foreground] text-center">Currently undergoing maintenance.</span>
			</div>

			<div class="border-t border-[--border] w-full my-4"></div>

			<button
				onclick="window.location.reload()"
				class="w-full flex items-center justify-center gap-2 bg-[--primary] hover:opacity-80 duration-200 text-[--primary-foreground] font-semibold py-2 px-4 rounded"
			>
				Refresh
			</button>

			<span class="text-sm text-[--muted-foreground] text-center"> by Joel Cutler </span>
		</div>
	</body>
</html>
